<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026渔博会 - 展位销售系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="login-view" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">渔博会销售系统</h2>
            <input type="text" id="username" placeholder="请输入姓名 (测试输入: admin)" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <input type="password" id="password" placeholder="请输入密码 (测试输入: 123)" class="w-full border p-3 rounded mb-6 focus:outline-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">登 录</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 text-center hidden">账号或密码错误</p>
        </div>
    </div>

    <div id="main-view" class="hidden min-h-screen p-6 max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded shadow">
            <h1 class="text-xl font-bold">欢迎, <span id="current-user" class="text-blue-600"></span></h1>
            <button onclick="location.reload()" class="text-gray-500 hover:text-red-500">安全退出</button>
        </header>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-bold border-b pb-3 mb-4">录入成交信息</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="company_name" placeholder="企业名称 *" class="border p-2 rounded w-full">
                <input type="text" id="credit_code" placeholder="统一社会信用代码" class="border p-2 rounded w-full">
                
                <div class="col-span-1 md:col-span-2 flex gap-2">
                    <select id="region_level1" onchange="changeRegion1()" class="border p-2 rounded w-1/3">
                        <option value="">选择国家/地区 *</option>
                        <option value="国内">国内</option>
                        <option value="港澳台">港澳台</option>
                        <option value="国际">国际</option>
                    </select>
                    <div id="region_level2_container" class="w-2/3 flex gap-2"></div>
                </div>

                <input type="text" id="contact_person" placeholder="联系人" class="border p-2 rounded w-full">
                <input type="text" id="phone" placeholder="手机号码" class="border p-2 rounded w-full">
                
                <select id="booth_select" onchange="changeBooth()" class="border p-2 rounded w-full">
                    <option value="">正在加载可售展位...</option>
                </select>
                
                <div class="bg-blue-50 p-2 rounded text-sm flex items-center gap-4 border border-blue-100">
                    <span>类型: <strong id="show_type">-</strong></span>
                    <span>面积: <strong id="show_area">0</strong> ㎡</span>
                </div>

                <input type="number" id="unit_price" oninput="calculateTotal()" placeholder="展位单价 (元/㎡) *" class="border p-2 rounded w-full">
                
                <div class="bg-green-50 p-2 rounded border border-green-100 flex items-center">
                    <span>展位费总计：<strong class="text-green-600 text-lg" id="total_amount">0</strong> 元</span>
                </div>
            </div>

            <button onclick="submitOrder()" class="mt-6 w-full bg-green-600 text-white p-3 rounded font-bold hover:bg-green-700">提交成交订单</button>
        </div>
    </div>

    <script>
        let allBooths = []; // 存放从数据库获取的展位数据
        let currentSalesName = "";

        // 1. 登录逻辑
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            
            if(res.ok) {
                const data = await res.json();
                currentSalesName = data.user.name;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('current-user').innerText = currentSalesName;
                loadBooths(); // 登录成功后拉取展位
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // 2. 加载可售展位
        async function loadBooths() {
            const res = await fetch('/api/get-booths');
            if(res.ok) {
                allBooths = await res.json();
                const sel = document.getElementById('booth_select');
                sel.innerHTML = '<option value="">请选择展位 *</option>';
                allBooths.forEach(b => {
                    sel.innerHTML += `<option value="${b.id}">${b.hall} - ${b.id}</option>`;
                });
            }
        }

        // 3. 展位选择联动
        function changeBooth() {
            const boothId = document.getElementById('booth_select').value;
            const booth = allBooths.find(b => b.id === boothId);
            if(booth) {
                document.getElementById('show_type').innerText = booth.booth_type;
                document.getElementById('show_area').innerText = booth.area;
            } else {
                document.getElementById('show_type').innerText = '-';
                document.getElementById('show_area').innerText = '0';
            }
            calculateTotal();
        }

        // 4. 自动计算总价
        function calculateTotal() {
            const area = parseFloat(document.getElementById('show_area').innerText) || 0;
            const price = parseFloat(document.getElementById('unit_price').value) || 0;
            document.getElementById('total_amount').innerText = area * price;
        }

        // 5. 地区级联逻辑
        function changeRegion1() {
            const lvl1 = document.getElementById('region_level1').value;
            const container = document.getElementById('region_level2_container');
            if (lvl1 === '国际') {
                container.innerHTML = '<input type="text" id="region_detail" placeholder="输入国家名称" class="border p-2 rounded w-full">';
            } else if (lvl1 === '港澳台') {
                container.innerHTML = `<select id="region_detail" class="border p-2 rounded w-full">
                    <option value="香港">香港</option><option value="澳门">澳门</option><option value="台湾">台湾</option></select>`;
            } else if (lvl1 === '国内') {
                container.innerHTML = `<select id="prov" onchange="changeProv()" class="border p-2 rounded w-1/2"><option value="">选择省份</option><option value="福建">福建省</option><option value="广东">广东省</option><option value="浙江">浙江省</option><option value="其他省份">其他省份</option></select><div id="city_container" class="w-1/2"></div>`;
            } else {
                container.innerHTML = '';
            }
        }

        function changeProv() {
            const prov = document.getElementById('prov').value;
            const cityCon = document.getElementById('city_container');
            if (prov === '福建') {
                cityCon.innerHTML = `<select id="city" onchange="changeCity()" class="border p-2 rounded w-full"><option value="">选择城市</option><option value="福州">福州市</option><option value="厦门">厦门市</option><option value="其他地市">其他地市</option></select><div id="county_container" class="mt-2 w-full"></div>`;
            } else if(prov) {
                cityCon.innerHTML = `<input type="text" id="city" placeholder="输入城市名" class="border p-2 rounded w-full">`;
            } else {
                cityCon.innerHTML = '';
            }
        }

        function changeCity() {
            const city = document.getElementById('city').value;
            const countyCon = document.getElementById('county_container');
            if (city === '福州') {
                countyCon.innerHTML = `<select id="county" class="border p-2 rounded w-full"><option value="">选择区县</option><option value="鼓楼区">鼓楼区</option><option value="台江区">台江区</option><option value="仓山区">仓山区</option><option value="马尾区">马尾区</option><option value="晋安区">晋安区</option><option value="长乐区">长乐区</option><option value="其他区县">其他</option></select>`;
            } else {
                countyCon.innerHTML = '';
            }
        }

        // 6. 提交订单
        async function submitOrder() {
            const data = {
                company_name: document.getElementById('company_name').value,
                booth_id: document.getElementById('booth_select').value,
                total_amount: parseFloat(document.getElementById('total_amount').innerText) || 0,
                sales_name: currentSalesName,
                region_info: document.getElementById('region_level1').value // 简化的地区提交
            };

            if(!data.company_name || !data.booth_id || data.total_amount <= 0) {
                alert("请填写完整的企业名称、选择展位并输入单价！"); return;
            }

            const res = await fetch('/api/submit-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                alert("成交订单提交成功！");
                location.reload(); // 刷新页面
            } else {
                alert("提交失败，请重试。");
            }
        }
    </script>
</body>
</html>
