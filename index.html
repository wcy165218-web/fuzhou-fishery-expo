<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展位销售管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">系统登录</h2>
            <input type="text" id="login-user" placeholder="姓名 (如: admin)" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <input type="password" id="login-pass" placeholder="密码 (如: 123)" class="w-full border p-3 rounded mb-6 focus:outline-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">登 录</button>
        </div>
    </div>

    <div id="main-view" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-lg z-10">
            <div class="p-5 border-b border-slate-700">
                <h1 class="text-xl font-bold tracking-wider">展位销售系统</h1>
                <p id="user-info" class="text-sm text-slate-400 mt-2"></p>
            </div>
            <nav id="nav-buttons" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-700">
                <button onclick="location.reload()" class="w-full bg-red-600/80 p-2 rounded hover:bg-red-600 text-sm font-bold transition">安全退出</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50 h-screen overflow-hidden">
            
            <header class="bg-white h-16 shadow-sm flex items-center justify-between px-6 shrink-0 z-0">
                <h2 id="current-page-title" class="text-lg font-bold text-gray-700">首页看板</h2>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500 font-bold">当前操作项目：</span>
                    <select id="global-project-select" onchange="onProjectChange()" class="border-2 border-blue-500 text-blue-700 font-bold p-2 rounded bg-blue-50 focus:outline-none min-w-[200px]">
                        <option value="">正在加载项目...</option>
                    </select>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6">
                
                <section id="sec-home" class="page-section active">
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded">
                        <p class="text-blue-700">欢迎进入系统！请先在左侧菜单点击 <strong>“系统与人员配置”</strong>，创建您的第一个展会项目。</p>
                    </div>
                </section>

                <section id="sec-config" class="page-section">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        
                        <div class="bg-white p-6 rounded shadow border-t-4 border-indigo-500">
                            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">📂 展会项目管理</h3>
                            
                            <div class="bg-gray-50 p-4 rounded border mb-6">
                                <h4 class="text-sm font-bold text-gray-600 mb-3">新建展会项目</h4>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <input type="text" id="new-proj-name" placeholder="项目名称 (例: 2026福州渔博会)" class="col-span-2 border p-2 rounded text-sm">
                                    <input type="number" id="new-proj-year" placeholder="归属年份 (例: 2026)" class="border p-2 rounded text-sm">
                                    <div></div>
                                    <div class="col-span-2 flex items-center gap-2 text-sm text-gray-600">
                                        开展: <input type="date" id="new-proj-start" class="border p-1 rounded flex-1">
                                        撤展: <input type="date" id="new-proj-end" class="border p-1 rounded flex-1">
                                    </div>
                                </div>
                                <button onclick="createProject()" class="w-full bg-indigo-600 text-white p-2 rounded text-sm font-bold hover:bg-indigo-700 transition">保存新项目</button>
                            </div>

                            <h4 class="text-sm font-bold text-gray-600 mb-2">已有项目列表</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left border">
                                    <thead class="bg-gray-100 border-b">
                                        <tr>
                                            <th class="p-2">项目名称</th>
                                            <th class="p-2">展期</th>
                                            <th class="p-2">状态</th>
                                        </tr>
                                    </thead>
                                    <tbody id="project-list-tbody" class="divide-y">
                                        <tr><td colspan="3" class="p-2 text-center text-gray-500">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded shadow border-t-4 border-emerald-500">
                            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">👥 业务员账号管理</h3>
                            
                            <div class="bg-gray-50 p-4 rounded border mb-6">
                                <h4 class="text-sm font-bold text-gray-600 mb-3">添加新账号</h4>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <input type="text" id="new-staff-name" placeholder="员工姓名 (登录账号)" class="col-span-2 border p-2 rounded text-sm">
                                    <input type="text" id="new-staff-pass" value="123456" placeholder="初始密码" class="border p-2 rounded text-sm">
                                    <select id="new-staff-role" class="border p-2 rounded text-sm">
                                        <option value="user">普通业务员</option>
                                        <option value="admin">管理员</option>
                                    </select>
                                </div>
                                <button onclick="createStaff()" class="w-full bg-emerald-600 text-white p-2 rounded text-sm font-bold hover:bg-emerald-700 transition">添加人员</button>
                            </div>

                            <h4 class="text-sm font-bold text-gray-600 mb-2">系统账号列表</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left border">
                                    <thead class="bg-gray-100 border-b">
                                        <tr>
                                            <th class="p-2">姓名</th>
                                            <th class="p-2">角色</th>
                                            <th class="p-2">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="staff-list-tbody" class="divide-y">
                                        <tr><td colspan="3" class="p-2 text-center text-gray-500">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                    </div>
                </section>

                <section id="sec-booth" class="page-section">展位库开发中...</section>
                <section id="sec-order" class="page-section">成交录入开发中...</section>

            </div>
        </main>
    </div>

    <script>
        let currentUser = null;
        let allProjects = [];

        const navConfig = [
            { id: 'home', label: '📊 首页看板', roles: ['admin', 'user'] },
            { id: 'config', label: '⚙️ 系统与人员配置', roles: ['admin'] },
            { id: 'booth', label: '🎪 展位库管理', roles: ['admin'] },
            { id: 'order', label: '✍️ 订单与财务录入', roles: ['admin', 'user'] },
        ];

        // --- 核心初始化与导航 ---
        async function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if(!u || !p) return alert("请输入账号密码");

            const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({username: u, password: p}) });
            if (res.ok) {
                currentUser = (await res.json()).user;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                
                const roleName = currentUser.role === 'admin' ? '管理员' : '销售代表';
                document.getElementById('user-info').innerText = `${currentUser.name} (${roleName})`;
                
                renderNav();
                await loadProjects(); // 登录成功后拉取项目
                
            } else {
                alert('登录失败，请检查账号密码');
            }
        }

        function renderNav() {
            const btnContainer = document.getElementById('nav-buttons');
            btnContainer.innerHTML = '';
            navConfig.forEach(item => {
                if (item.roles.includes(currentUser.role)) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-3 rounded text-slate-300 hover:bg-blue-600 hover:text-white transition text-sm font-medium mb-1";
                    btn.innerText = item.label;
                    btn.onclick = () => {
                        document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
                        document.getElementById(`sec-${item.id}`).classList.add('active');
                        document.getElementById('current-page-title').innerText = item.label.substring(3);
                        // 如果点的是配置页，加载人员列表
                        if(item.id === 'config') loadStaff();
                    };
                    btnContainer.appendChild(btn);
                }
            });
        }

        // --- 项目管理功能 ---
        async function loadProjects() {
            const res = await fetch('/api/projects');
            allProjects = await res.json();
            
            // 填充顶部下拉框
            const select = document.getElementById('global-project-select');
            select.innerHTML = '';
            
            // 填充配置页的表格
            const tbody = document.getElementById('project-list-tbody');
            tbody.innerHTML = '';

            if(allProjects.length === 0) {
                select.innerHTML = '<option value="">暂无项目，请先创建</option>';
                tbody.innerHTML = '<tr><td colspan="3" class="p-2 text-center text-gray-500">暂无项目记录</td></tr>';
                return;
            }

            allProjects.forEach(p => {
                // 下拉框
                select.innerHTML += `<option value="${p.id}">${p.name} (${p.year})</option>`;
                // 表格
                const dateStr = (p.start_date && p.end_date) ? `${p.start_date.substring(5)} 至 ${p.end_date.substring(5)}` : '未设置';
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-2 font-medium text-blue-600">${p.name}</td>
                        <td class="p-2 text-gray-500">${dateStr}</td>
                        <td class="p-2"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">${p.status}</span></td>
                    </tr>
                `;
            });
        }

        async function createProject() {
            const data = {
                name: document.getElementById('new-proj-name').value,
                year: document.getElementById('new-proj-year').value,
                start_date: document.getElementById('new-proj-start').value,
                end_date: document.getElementById('new-proj-end').value
            };
            if(!data.name || !data.year) return alert("项目名称和年份为必填项！");

            const res = await fetch('/api/projects', { method: 'POST', body: JSON.stringify(data) });
            if(res.ok) {
                alert("项目创建成功！");
                document.getElementById('new-proj-name').value = '';
                loadProjects(); // 刷新列表
            } else {
                alert("创建失败");
            }
        }

        // --- 人员管理功能 ---
        async function loadStaff() {
            const res = await fetch('/api/staff');
            const staff = await res.json();
            const tbody = document.getElementById('staff-list-tbody');
            tbody.innerHTML = '';
            staff.forEach(s => {
                const roleBadge = s.role === 'admin' 
                    ? '<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">管理员</span>' 
                    : '<span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">业务员</span>';
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-2 font-medium">${s.name}</td>
                        <td class="p-2">${roleBadge}</td>
                        <td class="p-2 text-xs text-blue-500 cursor-pointer hover:underline">重置密码</td>
                    </tr>
                `;
            });
        }

        async function createStaff() {
            const data = {
                name: document.getElementById('new-staff-name').value,
                password: document.getElementById('new-staff-pass').value,
                role: document.getElementById('new-staff-role').value
            };
            if(!data.name) return alert("请输入员工姓名！");

            const res = await fetch('/api/staff', { method: 'POST', body: JSON.stringify(data) });
            if(res.ok) {
                alert("人员添加成功！");
                document.getElementById('new-staff-name').value = '';
                loadStaff(); // 刷新列表
            } else {
                const err = await res.json();
                alert(err.message || "添加失败");
            }
        }

        // 监听全局项目切换
        function onProjectChange() {
            const projId = document.getElementById('global-project-select').value;
            console.log("当前操作已切换到项目 ID:", projId);
            // 后续：切换项目后，自动刷新展位库和订单表的数据
        }
    </script>
</body>
</html>
