<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展位销售管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center"><div class="bg-white p-6 rounded-lg shadow-2xl w-96"><h3 class="text-lg font-bold mb-4">修改密码</h3><input type="password" id="modal-old-pass" placeholder="原密码" class="w-full border p-2 rounded mb-3 text-sm"><input type="password" id="modal-new-pass" placeholder="新密码" class="w-full border p-2 rounded mb-5 text-sm"><div class="flex justify-end gap-2"><button onclick="closeModal('password-modal')" class="px-4 py-2 bg-gray-200 rounded text-sm">取消</button><button onclick="submitPasswordChange()" class="px-4 py-2 bg-blue-600 text-white rounded text-sm font-bold">确认</button></div></div></div>
    <div id="edit-booth-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center"><div class="bg-white p-6 rounded-lg shadow-2xl w-96"><h3 class="text-lg font-bold mb-4 text-indigo-700">修改展位信息</h3><p class="text-xs text-gray-500 mb-3">当前编辑展位：<span id="eb-id" class="font-bold text-gray-800 text-base"></span></p><div class="space-y-3"><div class="flex items-center"><span class="bg-gray-100 border border-r-0 p-2 rounded-l text-sm text-gray-600 w-20">类型</span><select id="eb-type" class="w-full border p-2 rounded-r text-sm"><option>标摊</option><option>豪标</option><option>光地</option></select></div><div class="flex items-center"><span class="bg-gray-100 border border-r-0 p-2 rounded-l text-sm text-gray-600 w-20">总面积</span><input type="number" id="eb-area" class="w-full border p-2 text-sm"><span class="bg-gray-100 border border-l-0 p-2 rounded-r text-gray-500 text-sm">㎡</span></div><div class="flex items-center mt-2 border-t pt-2"><span class="bg-red-50 text-red-700 border border-r-0 border-red-200 p-2 rounded-l text-sm w-28">独立单价(元)</span><input type="number" id="eb-custom-price" placeholder="填0则随全局单价" class="w-full border border-red-200 p-2 rounded-r text-sm"></div></div><div class="flex justify-end gap-2 mt-6"><button onclick="closeModal('edit-booth-modal')" class="px-4 py-2 bg-gray-200 rounded text-sm">取消</button><button onclick="submitEditBooth()" class="px-4 py-2 bg-indigo-600 text-white rounded text-sm font-bold">保存修改</button></div></div></div>

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">系统登录</h2>
            <input type="text" id="login-user" placeholder="姓名" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <input type="password" id="login-pass" placeholder="密码" class="w-full border p-3 rounded mb-6 focus:outline-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">登 录</button>
        </div>
    </div>

    <div id="main-view" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-lg z-10 shrink-0">
            <div class="p-5 border-b border-slate-700">
                <h1 class="text-xl font-bold tracking-wider">展位销售系统</h1>
                <p id="user-info" class="text-sm text-slate-400 mt-2"></p>
                <button onclick="openPasswordModal()" class="text-xs text-blue-400 mt-1 hover:underline">修改密码</button>
            </div>
            <nav id="nav-buttons" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-700">
                <button onclick="handleLogout()" class="w-full bg-red-600/80 p-2 rounded hover:bg-red-600 text-sm font-bold transition">退出登录</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50 h-screen overflow-hidden">
            <header class="bg-white h-16 shadow-sm flex items-center justify-between px-6 shrink-0 z-0">
                <h2 id="current-page-title" class="text-lg font-bold text-gray-700">首页看板</h2>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500 font-bold">当前操作项目：</span>
                    <select id="global-project-select" onchange="onProjectChange()" class="border-2 border-blue-500 text-blue-700 font-bold p-2 rounded bg-blue-50 focus:outline-none min-w-[200px]"></select>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6">
                
                <section id="sec-config" class="page-section">功能正常运行，暂略显示结构...</section>
                <section id="sec-booth" class="page-section">展位库功能正常运行，暂略显示结构...</section>
                <section id="sec-order-list" class="page-section">下个阶段开发：订单大盘与财务管理...</section>

                <section id="sec-order-entry" class="page-section active">
                    <div class="max-w-5xl mx-auto space-y-6 pb-20">
                        
                        <div class="bg-white p-6 rounded shadow border-t-4 border-blue-600">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🏢 第一步：客户基本资料</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <label class="block text-gray-600 mb-1">参展企业全称 <span class="text-red-500">*</span></label>
                                    <input type="text" id="order-company" class="w-full border p-2 rounded" placeholder="请输入企业公章名称">
                                </div>
                                <div>
                                    <label class="block text-gray-600 mb-1">
                                        统一社会信用代码 <span class="text-red-500">*</span>
                                        <label class="inline-flex items-center ml-4 text-xs text-blue-600 cursor-pointer">
                                            <input type="checkbox" id="order-no-code" onchange="toggleCreditCode()" class="mr-1"> 境外/特殊无代码
                                        </label>
                                    </label>
                                    <input type="text" id="order-credit-code" class="w-full border p-2 rounded bg-yellow-50 focus:bg-white" placeholder="此项作为防撞单查重依据，请准确填写">
                                </div>
                                <div>
                                    <label class="block text-gray-600 mb-1">主营业务/展品</label>
                                    <input type="text" id="order-business" list="industry-list" class="w-full border p-2 rounded" placeholder="手动输入或下拉选择">
                                    <datalist id="industry-list">
                                        <option value="水产加工"><option value="渔船设备"><option value="海鲜冻品"><option value="养殖技术">
                                    </datalist>
                                </div>
                                <div class="flex gap-2">
                                    <div class="w-1/3">
                                        <label class="block text-gray-600 mb-1">所属省市区</label>
                                        <input type="text" id="order-region" class="w-full border p-2 rounded" placeholder="如: 福建福州">
                                    </div>
                                    <div class="w-1/3">
                                        <label class="block text-gray-600 mb-1">联系人 <span class="text-red-500">*</span></label>
                                        <input type="text" id="order-contact" class="w-full border p-2 rounded">
                                    </div>
                                    <div class="w-1/3">
                                        <label class="block text-gray-600 mb-1">联系电话 <span class="text-red-500">*</span></label>
                                        <input type="text" id="order-phone" class="w-full border p-2 rounded">
                                    </div>
                                </div>
                                <div class="col-span-2 bg-gray-50 p-3 rounded border">
                                    <label class="inline-flex items-center text-gray-700 font-bold cursor-pointer mb-2">
                                        <input type="checkbox" id="order-is-agent" onchange="toggleAgent()" class="mr-2 w-4 h-4"> 本单由代理商代招
                                    </label>
                                    <input type="text" id="order-agent-name" class="w-full border p-2 rounded hidden" placeholder="请输入代理商公司名称">
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded shadow border-t-4 border-red-500">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">💰 第二步：展位选定与计价</h3>
                            
                            <div class="mb-4">
                                <label class="block text-gray-600 mb-1 font-bold">分配展位 <span class="text-red-500">*</span></label>
                                <div class="flex gap-2">
                                    <select id="order-booth-select" onchange="autoFillBoothData()" class="w-2/3 border-2 border-blue-400 p-2 rounded text-blue-800 font-bold bg-blue-50">
                                        <option value="">-- 请选择当前可售展位 --</option>
                                    </select>
                                    <label class="w-1/3 inline-flex items-center text-xs text-gray-500 cursor-pointer bg-gray-100 px-2 rounded border">
                                        <input type="checkbox" id="order-is-joint" onchange="toggleJointExhibition()" class="mr-1"> 本单为联合参展 (允许选手工指定面积)
                                    </label>
                                </div>
                            </div>

                            <div class="grid grid-cols-3 gap-4 text-sm bg-red-50 p-4 rounded border border-red-100 mb-4">
                                <div><span class="text-gray-500">展位类型：</span><span id="calc-type" class="font-bold text-gray-800">-</span></div>
                                <div><span class="text-gray-500">总面积：</span><span id="calc-area" class="font-bold text-blue-700">-</span> ㎡</div>
                                <div><span class="text-gray-500">计价策略：</span><span id="calc-unit" class="font-bold text-gray-800">-</span></div>
                                <div class="col-span-3 border-t border-red-200 mt-2 pt-2">
                                    <span class="text-gray-600 font-bold">系统标准展位费：</span>
                                    <span id="calc-standard-fee" class="text-xl font-bold text-red-600">¥ 0</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <label class="block text-gray-800 font-bold mb-1">最终成交展位费 (元) <span class="text-red-500">*</span></label>
                                    <input type="number" id="order-actual-fee" oninput="calculateFinalTotal()" class="w-full border-2 border-green-500 p-2 rounded text-lg font-bold text-green-700" placeholder="请输入跟客户谈妥的实际价格">
                                </div>
                                <div>
                                    <label class="block text-gray-600 mb-1">其他代收/杂费 (元)</label>
                                    <input type="number" id="order-other-fee" oninput="calculateFinalTotal()" class="w-full border p-2 rounded" placeholder="例如角位费、施工管理费等，没有填0">
                                </div>
                                <div id="discount-reason-container" class="col-span-2 hidden">
                                    <label class="block text-red-600 font-bold mb-1">⚠️ 警报：成交价低于标准价，请必须填写优惠理由供财务审核！</label>
                                    <input type="text" id="order-discount-reason" class="w-full border border-red-400 p-2 rounded bg-red-50" placeholder="如：三年连签老客户特批优惠...">
                                </div>
                            </div>
                            
                            <div class="mt-6 bg-gray-800 text-white p-4 rounded text-right flex justify-between items-center">
                                <span class="text-gray-300">本单应收总金额合计 = 实际展位费 + 其他杂费</span>
                                <span class="text-3xl font-bold text-yellow-400" id="calc-final-total">¥ 0</span>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded shadow border-t-4 border-green-500">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🛠️ 第三步：展会后期执行 (可稍后补充)</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <label class="block text-gray-600 mb-1">楣板全称 (展位招牌字)</label>
                                    <input type="text" id="order-fascia" class="w-full border p-2 rounded" placeholder="未确认可留空">
                                </div>
                                <div>
                                    <label class="block text-gray-600 mb-1">需要制作的楣板数量</label>
                                    <input type="number" id="order-fascia-count" class="w-full border p-2 rounded" placeholder="通常标摊1个，双开口2个">
                                </div>
                            </div>
                        </div>

                        <button onclick="submitOrderForm()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 rounded shadow-lg transition">
                            ✅ 确认无误，生成订单并锁定展位
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        let currentUser = null; 
        let allProjects = []; 
        let globalPrices = { '标摊': 0, '豪标': 0, '光地': 0 };
        let currentAvailableBooths = []; // 存放当前下拉框里的展位对象
        let currentStandardFee = 0; // 暂存系统计算的标准价

        const navConfig = [
            { id: 'order-entry', label: '✍️ 订单信息录入', roles: ['admin', 'user'] },
            { id: 'order-list', label: '📁 订单与财务大盘', roles: ['admin', 'user'] },
            { id: 'booth', label: '🎪 展位库管理', roles: ['admin'] },
            { id: 'config', label: '⚙️ 系统与人员配置', roles: ['admin'] },
        ];

        // 基础登录/路由
        const savedUser = localStorage.getItem('exhibition_user');
        if (savedUser) { currentUser = JSON.parse(savedUser); }
        document.addEventListener('DOMContentLoaded', () => { if (currentUser) enterMainView(); });
        
        async function handleLogin() {
            const u = document.getElementById('login-user').value; const p = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({username: u, password: p}) });
            if (res.ok) { currentUser = (await res.json()).user; localStorage.setItem('exhibition_user', JSON.stringify(currentUser)); enterMainView(); } else alert('登录失败');
        }
        function handleLogout() { localStorage.removeItem('exhibition_user'); location.reload(); }
        function enterMainView() {
            document.getElementById('login-view').classList.add('hidden'); document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('user-info').innerText = `${currentUser.name} (${currentUser.role === 'admin' ? '管理员' : '业务员'})`;
            renderNav(); loadProjects();
        }
        function renderNav() {
            const container = document.getElementById('nav-buttons'); container.innerHTML = '';
            navConfig.forEach(item => {
                if (item.roles.includes(currentUser.role)) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-3 rounded text-slate-300 hover:bg-blue-600 transition text-sm mb-1";
                    btn.innerText = item.label;
                    btn.onclick = () => {
                        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                        document.getElementById(`sec-${item.id}`).classList.add('active');
                        document.getElementById('current-page-title').innerText = item.label.substring(3);
                        
                        // 路由逻辑
                        if(item.id === 'order-entry') initOrderForm();
                        // (原有的 config 和 booth 加载被精简隐藏，这里只重点测订单页)
                    };
                    container.appendChild(btn);
                }
            });
        }
        
        async function loadProjects() {
            allProjects = await (await fetch('/api/projects')).json();
            const sel = document.getElementById('global-project-select'); sel.innerHTML = '';
            allProjects.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
            onProjectChange();
        }
        
        function onProjectChange() {
            if(document.getElementById('sec-order-entry').classList.contains('active')) initOrderForm();
        }

        // ================= 订单录入表单核心逻辑 =================
        
        // 1. 初始化表单 (加载展位和价格)
        async function initOrderForm() {
            const pid = document.getElementById('global-project-select').value; if(!pid) return;
            
            // 先拉取全局价格用于计算
            const pRes = await fetch(`/api/prices?projectId=${pid}`);
            const data = await pRes.json();
            globalPrices = { '标摊': data['标摊']||0, '豪标': data['豪标']||0, '光地': data['光地']||0 };

            // 再拉取展位列表 (只选可售或预订)
            const bRes = await fetch(`/api/booths?projectId=${pid}`);
            const allBooths = await bRes.json();
            currentAvailableBooths = allBooths.filter(b => b.status === '可售' || b.status === '已预订');
            
            const sel = document.getElementById('order-booth-select');
            sel.innerHTML = '<option value="">-- 请选择当前可售展位 --</option>';
            currentAvailableBooths.forEach(b => {
                const mark = b.status === '已预订' ? ' [别人已预订]' : '';
                sel.innerHTML += `<option value="${b.id}">${b.hall} - ${b.id} (${b.type} ${b.area}㎡)${mark}</option>`;
            });

            // 清空旧数据
            resetOrderForm();
        }

        function resetOrderForm() {
            const inputs = ['order-company', 'order-credit-code', 'order-business', 'order-region', 'order-contact', 'order-phone', 'order-agent-name', 'order-actual-fee', 'order-other-fee', 'order-discount-reason', 'order-fascia', 'order-fascia-count'];
            inputs.forEach(id => document.getElementById(id).value = '');
            document.getElementById('order-is-agent').checked = false;
            document.getElementById('order-no-code').checked = false;
            toggleAgent(); toggleCreditCode();
            
            document.getElementById('calc-type').innerText = '-';
            document.getElementById('calc-area').innerText = '-';
            document.getElementById('calc-unit').innerText = '-';
            document.getElementById('calc-standard-fee').innerText = '¥ 0';
            document.getElementById('calc-final-total').innerText = '¥ 0';
            currentStandardFee = 0;
            document.getElementById('discount-reason-container').classList.add('hidden');
        }

        // 2. 界面动态联动交互
        function toggleAgent() {
            const box = document.getElementById('order-agent-name');
            if(document.getElementById('order-is-agent').checked) box.classList.remove('hidden'); else box.classList.add('hidden');
        }
        function toggleCreditCode() {
            const input = document.getElementById('order-credit-code');
            if(document.getElementById('order-no-code').checked) {
                input.placeholder = "已勾选无代码，请输入护照号或自定义代号";
                input.classList.replace('bg-yellow-50', 'bg-gray-100');
            } else {
                input.placeholder = "此项作为防撞单查重依据，请准确填写";
                input.classList.replace('bg-gray-100', 'bg-yellow-50');
            }
        }
        function toggleJointExhibition() {
            // 如果是联合参展，提示人工注意即可，不修改硬逻辑
            if(document.getElementById('order-is-joint').checked) alert("已开启联合参展模式：您可以选择别人已预订的展位。如果您不想全额承担展位费，请在下方手动将实际展位费改小。");
        }

        // 3. 展位选中后的自动计价魔法
        function autoFillBoothData() {
            const bid = document.getElementById('order-booth-select').value;
            if(!bid) { resetOrderForm(); return; }

            const booth = currentAvailableBooths.find(b => b.id === bid);
            if(!booth) return;

            document.getElementById('calc-type').innerText = booth.type;
            document.getElementById('calc-area').innerText = booth.area;
            
            // 计价标准计算
            const priceUnit = booth.base_price > 0 ? booth.base_price : (globalPrices[booth.type] || 0);
            
            if(booth.type === '光地') {
                document.getElementById('calc-unit').innerText = `¥${priceUnit} /平米`;
                currentStandardFee = priceUnit * booth.area;
            } else {
                document.getElementById('calc-unit').innerText = `¥${priceUnit} /个(9㎡)`;
                currentStandardFee = priceUnit * (booth.area / 9);
            }

            document.getElementById('calc-standard-fee').innerText = `¥ ${currentStandardFee.toLocaleString()}`;
            // 自动填充实际金额等于标准金额
            document.getElementById('order-actual-fee').value = currentStandardFee;
            calculateFinalTotal();
        }

        // 4. 输入金额时的实时监控
        function calculateFinalTotal() {
            const actual = parseFloat(document.getElementById('order-actual-fee').value) || 0;
            const other = parseFloat(document.getElementById('order-other-fee').value) || 0;
            
            // 如果低于系统标准价，强制显示理由框
            const reasonBox = document.getElementById('discount-reason-container');
            if(actual < currentStandardFee) {
                reasonBox.classList.remove('hidden');
            } else {
                reasonBox.classList.add('hidden');
            }

            const total = actual + other;
            document.getElementById('calc-final-total').innerText = `¥ ${total.toLocaleString()}`;
        }

        // 5. 提交大招
        async function submitOrderForm() {
            const pid = document.getElementById('global-project-select').value;
            if(!pid) return alert("项目丢失，请刷新网页重试");

            // 取值与验证
            const company = document.getElementById('order-company').value.trim();
            const code = document.getElementById('order-credit-code').value.trim();
            const contact = document.getElementById('order-contact').value.trim();
            const phone = document.getElementById('order-phone').value.trim();
            const boothId = document.getElementById('order-booth-select').value;
            const actualFee = parseFloat(document.getElementById('order-actual-fee').value);
            const otherFee = parseFloat(document.getElementById('order-other-fee').value) || 0;
            
            if(!company) return alert("请填写参展企业全称");
            if(!code) return alert("请填写社会信用代码或代号");
            if(!contact || !phone) return alert("请填写联系人和电话");
            if(!boothId) return alert("请选择分配的展位");
            if(isNaN(actualFee)) return alert("请正确填写实际成交金额");

            const reason = document.getElementById('order-discount-reason').value.trim();
            if(actualFee < currentStandardFee && !reason) return alert("⚠️ 金额异常：您输入的成交价低于标准指导价，必须填写优惠理由！");

            const booth = currentAvailableBooths.find(b => b.id === boothId);

            const orderData = {
                project_id: pid,
                company_name: company,
                credit_code: code,
                no_code_checked: document.getElementById('order-no-code').checked,
                main_business: document.getElementById('order-business').value.trim(),
                is_agent: document.getElementById('order-is-agent').checked,
                agent_name: document.getElementById('order-agent-name').value.trim(),
                contact_person: contact,
                phone: phone,
                region: document.getElementById('order-region').value.trim(),
                booth_id: boothId,
                area: booth.area,
                price_unit: booth.type === '光地' ? '平米' : '个',
                unit_price: booth.base_price > 0 ? booth.base_price : globalPrices[booth.type],
                total_booth_fee: actualFee,
                discount_reason: reason,
                other_income: otherFee,
                total_amount: actualFee + otherFee,
                sales_name: currentUser.name, // 记录签单人
                fascia_name: document.getElementById('order-fascia').value.trim(),
                fascia_count: document.getElementById('order-fascia-count').value || 1
            };

            // 发送请求
            const res = await fetch('/api/submit-order', { method: 'POST', body: JSON.stringify(orderData) });
            if(res.ok) {
                alert("🎉 订单录入成功！该展位已被锁定。即将为您刷新表单。");
                initOrderForm();
            } else {
                const err = await res.json();
                alert("录入失败：" + err.error);
            }
        }
    </script>
</body>
</html>
