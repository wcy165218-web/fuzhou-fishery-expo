<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026展位销售管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 控制页面切换的简单 CSS */
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">销售管理系统</h2>
            <input type="text" id="login-user" placeholder="请输入姓名" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <input type="password" id="login-pass" placeholder="请输入密码" class="w-full border p-3 rounded mb-6 focus:outline-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">登 录</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 text-center hidden">账号或密码错误</p>
        </div>
    </div>

    <div id="main-view" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-blue-900 text-white flex flex-col">
            <div class="p-4 border-b border-blue-800">
                <h1 class="text-lg font-bold">展位销售管理系统</h1>
                <p id="user-info" class="text-sm text-blue-300 mt-1"></p>
            </div>
            <nav id="nav-buttons" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
            <div class="p-4 border-t border-blue-800">
                <button onclick="location.reload()" class="w-full bg-red-600 p-2 rounded hover:bg-red-700 text-sm">安全退出</button>
            </div>
        </aside>

        <main class="flex-1 bg-gray-50 overflow-y-auto p-6">
            
            <section id="sec-home" class="page-section active">
                <h2 class="text-2xl font-bold mb-6">首页概览</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500">
                        <p class="text-gray-500 text-sm">展位销售进度</p>
                        <div class="flex items-center gap-2 mt-2">
                            <div class="w-full bg-gray-200 rounded-full h-2.5">
                                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                            </div>
                            <span id="progress-text" class="text-sm font-bold text-blue-600">0%</span>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
                        <p class="text-gray-500 text-sm">已确认款项 (元)</p>
                        <p id="stat-revenue" class="text-2xl font-bold text-green-600 mt-1">¥ 0</p>
                    </div>
                    <div class="bg-white p-4 rounded shadow border-l-4 border-orange-500">
                        <p class="text-gray-500 text-sm">距离开幕倒计时</p>
                        <p id="countdown-days" class="text-2xl font-bold text-orange-600 mt-1">-- 天</p>
                    </div>
                    <div class="bg-white p-4 rounded shadow border-l-4 border-purple-500">
                        <p class="text-gray-500 text-sm">参与销售人数</p>
                        <p class="text-2xl font-bold text-purple-600 mt-1">20 人</p>
                    </div>
                </div>
            </section>

            <section id="sec-staff-mgr" class="page-section">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2">业务员管理</h2>
                <div class="bg-white p-6 rounded shadow text-gray-500 italic">（功能开发预留位置：新增人员、设置目标）</div>
            </section>

            <section id="sec-booth-mgr" class="page-section">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2">展位库管理</h2>
                <div class="bg-white p-6 rounded shadow text-gray-500 italic">（功能开发预留位置：录入展位、修改底价）</div>
            </section>

            <section id="sec-order-entry" class="page-section">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2">新增成交订单</h2>
                <div class="bg-white p-6 rounded shadow text-gray-500 italic">（功能开发预留位置：级联选择、金额计算表单）</div>
            </section>

            <section id="sec-payment-entry" class="page-section">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2">财务收款登记</h2>
                <div class="bg-white p-6 rounded shadow text-gray-500 italic">（功能开发预留位置：登记分批收款明细）</div>
            </section>

            <section id="sec-summary" class="page-section">
                <h2 class="text-2xl font-bold mb-6 border-b pb-2" id="summary-title">数据汇总</h2>
                <div class="bg-white p-6 rounded shadow text-gray-500 italic">（功能开发预留位置：各销售人员目标完成表格）</div>
            </section>

        </main>
    </div>

    <script>
        let currentUser = null;

        // 【导航与权限配置表】
        const navConfig = [
            { id: 'home', label: '📊 首页看板', roles: ['admin', 'user'] },
            { id: 'staff-mgr', label: '👥 业务员管理', roles: ['admin'] },
            { id: 'booth-mgr', label: '🎪 展位库管理', roles: ['admin'] },
            { id: 'order-entry', label: '✍️ 成交订单录入', roles: ['admin', 'user'] },
            { id: 'payment-entry', label: '💰 财务收款登记', roles: ['admin', 'user'] },
            { id: 'summary', label: '📈 全局业绩汇总', roles: ['admin'] },
            { id: 'summary', label: '📈 我的业绩明细', roles: ['user'] } // 同一个页面，对销售显示不同文字
        ];

        // 1. 登录处理
        async function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            document.getElementById('login-error').classList.add('hidden');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({username: u, password: p})
                });

                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    initApp();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) {
                alert("系统连接失败，请稍后再试。");
            }
        }

        // 2. 初始化系统界面
        function initApp() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            
            // 显示用户身份
            const roleName = currentUser.role === 'admin' ? '管理员' : '销售代表';
            document.getElementById('user-info').innerText = `当前登录：${currentUser.name} (${roleName})`;

            // 渲染左侧导航按钮
            const btnContainer = document.getElementById('nav-buttons');
            btnContainer.innerHTML = '';
            
            navConfig.forEach(item => {
                if (item.roles.includes(currentUser.role)) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-3 rounded hover:bg-blue-800 transition text-sm font-medium focus:bg-blue-800";
                    btn.innerText = item.label;
                    btn.onclick = () => showPage(item.id, item.label);
                    btnContainer.appendChild(btn);
                }
            });

            // 启动倒计时计算
            calculateCountdown();

            // 默认打开首页
            showPage('home', '📊 首页看板');
        }

        // 3. 页面切换逻辑
        function showPage(pageId, label) {
            // 隐藏所有页面
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
            // 显示目标页面
            document.getElementById(`sec-${pageId}`).classList.add('active');
            
            // 动态修改汇总页标题
            if(pageId === 'summary') {
                document.getElementById('summary-title').innerText = label.substring(3); // 去掉前面的emoji
            }
        }

        // 4. 展会倒计时逻辑 (自动计算距离 2026年6月12日 的天数)
        function calculateCountdown() {
            const targetDate = new Date("2026-06-12T00:00:00").getTime();
            const now = new Date().getTime();
            const distance = targetDate - now;
            
            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days').innerText = days + " 天";
            } else {
                document.getElementById('countdown-days').innerText = "已开展";
                document.getElementById('countdown-days').classList.replace('text-orange-600', 'text-green-600');
            }
        }
    </script>
</body>
</html>
