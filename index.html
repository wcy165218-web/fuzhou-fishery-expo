<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展位销售管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg shadow-2xl w-96">
            <h3 class="text-lg font-bold mb-4">修改我的密码</h3>
            <input type="password" id="modal-old-pass" placeholder="原密码" class="w-full border p-2 rounded mb-3">
            <input type="password" id="modal-new-pass" placeholder="新密码" class="w-full border p-2 rounded mb-5">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('password-modal')" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                <button onclick="submitPasswordChange()" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">修改</button>
            </div>
        </div>
    </div>

    <div id="edit-project-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg shadow-2xl w-96">
            <h3 class="text-lg font-bold mb-4 text-indigo-700">编辑项目信息</h3>
            <input type="hidden" id="edit-p-id">
            <div class="space-y-3">
                <input type="text" id="edit-p-name" placeholder="项目名称" class="w-full border p-2 rounded text-sm">
                <input type="number" id="edit-p-year" placeholder="年份" class="w-full border p-2 rounded text-sm">
                <div class="text-xs text-gray-500">开展日期: <input type="date" id="edit-p-start" class="w-full border p-2 rounded mt-1"></div>
                <div class="text-xs text-gray-500">撤展日期: <input type="date" id="edit-p-end" class="w-full border p-2 rounded mt-1"></div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeModal('edit-project-modal')" class="px-4 py-2 bg-gray-200 rounded text-sm">取消</button>
                <button onclick="submitEditProject()" class="px-4 py-2 bg-indigo-600 text-white rounded text-sm font-bold">保存修改</button>
            </div>
        </div>
    </div>

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-blue-600 text-center">
            <h2 class="text-2xl font-bold mb-6 text-blue-800">系统登录</h2>
            <input type="text" id="login-user" placeholder="姓名" class="w-full border p-3 rounded mb-4 focus:outline-blue-500">
            <input type="password" id="login-pass" placeholder="密码" class="w-full border p-3 rounded mb-6 focus:outline-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">登 录</button>
        </div>
    </div>

    <div id="main-view" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-lg shrink-0">
            <div class="p-5 border-b border-slate-700">
                <h1 class="text-xl font-bold">展位销售系统</h1>
                <p id="user-info" class="text-sm text-slate-400 mt-2"></p>
                <button onclick="openPasswordModal()" class="text-xs text-blue-400 mt-1 hover:underline">修改我的密码</button>
            </div>
            <nav id="nav-buttons" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-700">
                <button onclick="handleLogout()" class="w-full bg-red-600/80 p-2 rounded hover:bg-red-600 text-sm font-bold transition">退出登录</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden">
            <header class="bg-white h-16 shadow-sm flex items-center justify-between px-6 shrink-0">
                <h2 id="current-page-title" class="text-lg font-bold text-gray-700">首页看板</h2>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500 font-bold">当前项目：</span>
                    <select id="global-project-select" onchange="onProjectChange()" class="border-2 border-blue-500 text-blue-700 font-bold p-2 rounded bg-blue-50 min-w-[200px]"></select>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6">
                <section id="sec-config" class="page-section">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded shadow border-t-4 border-indigo-500">
                            <h3 class="text-lg font-bold mb-4">📂 项目管理</h3>
                            <div class="bg-gray-50 p-4 rounded border mb-6">
                                <input type="text" id="new-proj-name" placeholder="项目名称" class="w-full border p-2 rounded text-sm mb-2">
                                <input type="number" id="new-proj-year" placeholder="年份" class="w-full border p-2 rounded text-sm mb-2">
                                <button onclick="createProject()" class="w-full bg-indigo-600 text-white p-2 rounded text-sm font-bold">创建新项目</button>
                            </div>
                            <table class="w-full text-sm border"><tbody id="project-list-tbody" class="divide-y"></tbody></table>
                        </div>
                        <div class="bg-white p-6 rounded shadow border-t-4 border-emerald-500">
                            <h3 class="text-lg font-bold mb-4">👥 人员管理</h3>
                            <div class="bg-gray-50 p-4 rounded border mb-6 flex gap-2">
                                <input type="text" id="new-staff-name" placeholder="姓名" class="border p-2 rounded text-sm flex-1">
                                <button onclick="createStaff()" class="bg-emerald-600 text-white px-4 rounded text-sm font-bold">添加</button>
                            </div>
                            <table class="w-full text-sm border"><tbody id="staff-list-tbody" class="divide-y"></tbody></table>
                        </div>
                    </div>
                </section>

                <section id="sec-booth" class="page-section">
                    <div class="bg-white p-6 rounded shadow border-t-4 border-orange-500">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold">🎪 展位库管理</h3>
                            <button onclick="downloadTemplate()" class="text-sm text-blue-600 underline">下载 CSV 模板</button>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                            <div class="bg-gray-50 border p-4 rounded space-y-2">
                                <input type="text" id="s-id" placeholder="展位号" class="w-full border p-2 rounded text-sm">
                                <input type="text" id="s-hall" placeholder="馆号" class="w-full border p-2 rounded text-sm">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="s-area" placeholder="面积" class="border p-2 rounded text-sm">
                                    <input type="number" id="s-open" placeholder="开口" class="border p-2 rounded text-sm">
                                </div>
                                <button onclick="addSingleBooth()" class="w-full bg-gray-800 text-white p-2 rounded text-sm">保存单条</button>
                            </div>
                            <div class="col-span-2 relative">
                                <textarea id="booth-import-text" rows="5" class="w-full border p-3 rounded text-sm font-mono bg-orange-50/30" placeholder="粘贴 Excel 内容..."></textarea>
                                <button onclick="parseAndImportBooths()" class="absolute bottom-2 right-2 bg-orange-600 text-white px-4 py-1 rounded text-sm">批量导入</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto border rounded"><table class="w-full text-sm text-left"><thead class="bg-gray-100 border-b"><tr><th class="p-2">展位号</th><th class="p-2">馆号</th><th class="p-2">类型</th><th class="p-2">面积</th><th class="p-2">状态干预</th></tr></thead><tbody id="booth-list-tbody" class="divide-y"></tbody></table></div>
                    </div>
                </section>

                <section id="sec-home" class="page-section active">首页看板</section>
                <section id="sec-order" class="page-section">订单模块开发中...</section>
            </div>
        </main>
    </div>

    <script>
        let currentUser = null; 
        let allProjects = [];

        const navConfig = [
            { id: 'home', label: '📊 首页看板', roles: ['admin', 'user'] },
            { id: 'config', label: '⚙️ 系统与人员配置', roles: ['admin'] },
            { id: 'booth', label: '🎪 展位库管理', roles: ['admin'] },
            { id: 'order', label: '✍️ 订单与财务录入', roles: ['admin', 'user'] },
        ];

        // 1. 初始化检查持久化登录
        window.onload = () => {
            const savedUser = localStorage.getItem('exhibition_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                enterMainView();
            }
        };

        async function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({username: u, password: p}) });
            if (res.ok) {
                currentUser = (await res.json()).user;
                localStorage.setItem('exhibition_user', JSON.stringify(currentUser));
                enterMainView();
            } else alert('登录失败');
        }

        function handleLogout() {
            localStorage.removeItem('exhibition_user');
            location.reload();
        }

        function enterMainView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('user-info').innerText = `${currentUser.name} (${currentUser.role === 'admin' ? '管理员' : '业务员'})`;
            renderNav();
            loadProjects();
        }

        function renderNav() {
            const container = document.getElementById('nav-buttons'); container.innerHTML = '';
            navConfig.forEach(item => {
                if (item.roles.includes(currentUser.role)) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-3 rounded text-slate-300 hover:bg-blue-600 transition text-sm mb-1";
                    btn.innerText = item.label;
                    btn.onclick = () => switchPage(item.id, item.label);
                    container.appendChild(btn);
                }
            });
        }

        function switchPage(id, label) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`sec-${id}`).classList.add('active');
            document.getElementById('current-page-title').innerText = label.substring(3);
            if(id === 'config') loadStaff(); 
            if(id === 'booth') loadBooths();
        }

        // 2. 项目管理 (增加编辑功能)
        async function loadProjects() {
            const res = await fetch('/api/projects');
            allProjects = await res.json();
            const sel = document.getElementById('global-project-select');
            const tbody = document.getElementById('project-list-tbody');
            sel.innerHTML = ''; tbody.innerHTML = '';
            
            allProjects.forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                tbody.innerHTML += `<tr class="border-b"><td class="p-2 font-bold">${p.name}</td><td class="p-2 text-right"><button onclick='openEditProjectModal(${JSON.stringify(p)})' class="text-blue-500 text-xs">编辑</button></td></tr>`;
            });
            onProjectChange();
        }

        function openEditProjectModal(p) {
            document.getElementById('edit-p-id').value = p.id;
            document.getElementById('edit-p-name').value = p.name;
            document.getElementById('edit-p-year').value = p.year;
            document.getElementById('edit-p-start').value = p.start_date;
            document.getElementById('edit-p-end').value = p.end_date;
            document.getElementById('edit-project-modal').classList.remove('hidden');
        }

        async function submitEditProject() {
            const data = {
                id: document.getElementById('edit-p-id').value,
                name: document.getElementById('edit-p-name').value,
                year: document.getElementById('edit-p-year').value,
                start_date: document.getElementById('edit-p-start').value,
                end_date: document.getElementById('edit-p-end').value
            };
            await fetch('/api/update-project', { method: 'POST', body: JSON.stringify(data) });
            closeModal('edit-project-modal');
            loadProjects();
        }

        async function createProject() {
            const data = { name: document.getElementById('new-proj-name').value, year: document.getElementById('new-proj-year').value };
            await fetch('/api/projects', { method: 'POST', body: JSON.stringify(data) });
            loadProjects();
        }

        // 3. 展位库 (修复刷新显示问题)
        async function addSingleBooth() {
            const pid = document.getElementById('global-project-select').value;
            const b = {
                project_id: pid, id: document.getElementById('s-id').value, hall: document.getElementById('s-hall').value,
                type: '标摊', area: parseFloat(document.getElementById('s-area').value),
                open_sides: parseInt(document.getElementById('s-open').value), price_unit: '个', base_price: 0
            };
            await fetch('/api/add-booth', { method: 'POST', body: JSON.stringify(b) });
            alert("添加成功");
            loadBooths(); // 关键：立即刷新列表
        }

        async function loadBooths() {
            const pid = document.getElementById('global-project-select').value;
            if(!pid) return;
            const res = await fetch(`/api/booths?projectId=${pid}`);
            const booths = await res.json();
            const tbody = document.getElementById('booth-list-tbody'); tbody.innerHTML = '';
            booths.forEach(b => {
                tbody.innerHTML += `<tr class="border-b"><td class="p-2">${b.id}</td><td class="p-2">${b.hall}</td><td class="p-2">${b.type}</td><td class="p-2">${b.area}</td><td class="p-2">${b.status}</td></tr>`;
            });
        }

        function onProjectChange() {
            if(document.getElementById('sec-booth').classList.contains('active')) loadBooths();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
