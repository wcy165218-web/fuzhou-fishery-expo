name = "fuzhou-fishery-expo"
main = "./_worker.js"
compatibility_date = "2026-03-20"

[assets]
directory = "./"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "exhibition_db"
database_id = "c190ca96-3fa2-48bf-aade-0b995f4f02bd"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "expo-contracts"
